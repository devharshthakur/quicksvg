services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - api_data:/app/data
      - api_logs:/app/logs
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: http://api:8000
    ports:
      - "4173:4173"
    environment:
      - API_BASE_URL=http://api:8000
      - ORIGIN=http://localhost:4173
      - PORT=4173
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
  api_logs:
